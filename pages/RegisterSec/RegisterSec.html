<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro Secretario</title>
    <link rel="stylesheet" href="RegisterSec.css">
</head>

<body>

    <div class="container">
        <div class="center">
            <h2>Cadastro Secretario</h2>

            <div class="input-group">
                <input type="text" placeholder="Nome">
            </div>

            <div class="input-group">
                <input type="email" placeholder="E-mail">
            </div>

            <div class="input-group">
                <input type="text" placeholder="CPF">
            </div>

            <div class="input-group">
                <input type="tel" placeholder="Telefone">
            </div>


            <button class="btn">Continuar</button>

        </div>
    </div>

</body>

</html>
