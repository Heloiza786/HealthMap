<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro Paciente</title>
    <link rel="stylesheet" href="RegisterPac.css">
</head>

<body>

    <div class="container">
        <div class="center">
            <h2>Cadastro Paciente</h2>

            <div class="input-group">
                <input type="text" placeholder="Nome">
            </div>

            <div class="input-group">
                <input type="email" placeholder="E-mail">
            </div>

            <div class="input-group">
                <input type="text" placeholder="CPF">
            </div>

            <div class="input-group">
                <input type="tel" placeholder="Telefone">
            </div>

            <button class="btn">Cadastrar</button>


            <button class="btn" onclick="irParaConsulta()">
                Agendar Consulta
            </button>
        </div>
    </div>

    <script>
        function irParaConsulta() {
            window.location.href = "../TypeMedicalCons/TypeMedicalCons.html";
        }
    </script>

</body>

</html>
