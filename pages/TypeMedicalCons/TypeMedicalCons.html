<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Tipos de Atendimentos</title>
    <link rel="stylesheet" href="TypeMedicalCons.css">
</head>

<body>

    <div class="container">
        <h1>Tipos de atendimentos</h1>
        <p>Selecione o tipo de consulta que deseja agendar</p>

        <div class="cards">

            <!-- ORTOPEDIA -->
            <div class="card">
                <img src="../../images/ortopedia.jpg" alt="Ortopedia">
                <div class="info">
                    <h3>Ortopedista</h3>
                    <button onclick="irConsulta('ortopedia')">Selecionar</button>
                </div>
            </div>

            <!-- DERMATOLOGIA -->
            <div class="card">
                <!-- <img src="../../images/dermatologia.jpg" alt="Dermatologia"> -->
                <img src="../../images/ortopedia.jpg" alt="Ortopedia">
                <div class="info">
                    <h3>Dermatologista</h3>
                    <button onclick="irConsulta('dermatologia')">Selecionar</button>
                </div>
            </div>

            <!-- CARDIOLOGIA -->
            <div class="card">
                <!-- <img src="../../images/cardiologia.jpg" alt="Cardiologia"> -->
                <img src="../../images/ortopedia.jpg" alt="Ortopedia">
                <div class="info">
                    <h3>Cardiologista</h3>
                    <button onclick="irConsulta('cardiologia')">Selecionar</button>
                </div>
            </div>

        </div>

        <button class="voltar" onclick="voltar()">← Voltar</button>
    </div>

    <script>
        function irConsulta(tipo) {

            window.location.href = `../ConsultMed/ConsultMed.html?tipo=${tipo}`;
        }

        function voltar() {
            window.history.back();
        }
    </script>

</body>

</html>
